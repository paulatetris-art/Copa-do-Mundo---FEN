<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Copa do Mundo - FEN 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#f0f5f1;color:#1a2e1a;font-family:'Barlow',sans-serif;min-height:100vh}
.bb{font-family:'Bebas Neue',cursive}
/* Colors */
:root{--green:#00a848;--gold:#d4a000;--dark:#0a2e18;--card:#ffffff;--border:#d0e8d0;--muted:#5a8a6a;--red:#c0392b;--text:#1a2e1a}
/* Layout */
.app{max-width:540px;margin:0 auto}
/* Header */
.hdr{background:linear-gradient(135deg,#0a2e18,#1a4a28);padding:12px 16px;border-bottom:3px solid var(--green)}
.hdr-inner{display:flex;align-items:center;gap:10px}
.hdr-title{font-family:'Bebas Neue',cursive;font-size:clamp(20px,5vw,30px);letter-spacing:3px;background:linear-gradient(90deg,#00d65a,#ffc300);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.hdr-sub{font-size:11px;color:#8abf9a;letter-spacing:1px;margin-top:2px}
/* Nav */
.nav{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.ntab{flex:1;padding:9px 4px;background:transparent;border:none;border-bottom:3px solid transparent;color:var(--muted);font-weight:700;font-size:10px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;font-family:'Barlow',sans-serif;transition:all .15s}
.ntab.act{border-bottom-color:var(--green);color:var(--green)}
.ntab span{display:block;font-size:15px;margin-bottom:2px}
/* Content */
.content{padding:14px 14px 80px}
/* Cards */
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,120,50,.06)}
/* Inputs */
input,select{background:#f5faf6;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 13px;font-size:14px;outline:none;width:100%;font-family:'Barlow',sans-serif}
input:focus,select:focus{border-color:var(--green)}
select option{background:#fff}
/* Buttons */
.btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:11px 18px;font-weight:700;cursor:pointer;font-size:13px;font-family:'Barlow',sans-serif}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-weight:700;cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif}
/* Badges */
.badge-paid{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:#e0f8ec;color:#007a35;border:1px solid #a0ddb8;white-space:nowrap}
.badge-pend{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:#fef0ee;color:#c0392b;border:1px solid #f0b0a8;white-space:nowrap}
/* Stepper */
.stepper{display:flex;align-items:center;background:#f0f8f3;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.step-btn{background:none;border:none;color:var(--muted);padding:6px 10px;cursor:pointer;font-size:18px;line-height:1;touch-action:manipulation}
.step-btn.plus{color:var(--green)}
.step-val{font-family:'Bebas Neue',cursive;color:#1a6a35;font-size:22px;min-width:28px;text-align:center}
/* Group grid */
.ggrids{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:12px}
.ggbtn{padding:7px 2px;border-radius:7px;cursor:pointer;font-weight:700;font-size:13px;font-family:'Bebas Neue',cursive;border:2px solid var(--border);background:#fff;color:var(--muted);position:relative;touch-action:manipulation}
.ggbtn.act{border-color:var(--green);background:var(--green);color:#fff}
.ggbtn.done{border-color:#a0ddb8;background:#e8f8ee;color:#007a35}
.ggbtn.part{border-color:#f0cc80;background:#fff8e8;color:#8a6a00}
/* Toast */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#007a35;color:#fff;padding:10px 22px;border-radius:100px;font-weight:700;z-index:9999;font-size:13px;white-space:nowrap;pointer-events:none;display:none;box-shadow:0 4px 16px rgba(0,150,60,.3)}
/* Loading */
#loading{position:fixed;inset:0;background:#f0f5f1;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:999}
@keyframes spin{to{transform:rotate(360deg)}}
/* Avatar */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9998;overflow-y:auto;padding:20px;align-items:flex-start;justify-content:center}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:16px;max-width:480px;width:100%;overflow:hidden;margin:auto}
.modal-hdr{background:#0a2e18;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:transparent;border:none;color:#fff;font-size:24px;cursor:pointer;line-height:1;padding:0}
.modal-body{padding:20px;font-size:13px;line-height:1.7;color:var(--text)}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border)}
/* Tour */
.tour-card{background:linear-gradient(135deg,#0a2e18,#1a4a28);border-radius:12px;padding:16px;margin-bottom:14px;border:2px solid #00d65a}
/* Warn */
.warn-box{background:#fff8e8;border:1px solid #f0cc80;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.danger-box{background:#fef2f2;border:2px solid #c0392b;border-radius:10px;padding:14px;text-align:center}
/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#b0d0b8;border-radius:2px}
/* Admin subtabs */
.stab{padding:7px 12px;border-radius:8px;cursor:pointer;font-weight:700;font-size:11px;font-family:'Barlow',sans-serif;border:1px solid var(--border);background:#fff;color:var(--muted);white-space:nowrap}
.stab.act{border-color:var(--green);background:#e8f8ee;color:#007a35}
/* Match card */
.match-row{display:flex;align-items:center;gap:6px}
.team-name{font-weight:600;font-size:12px;color:var(--text)}
.team-flag{font-size:16px}
/* Progress */
.prog-bar{height:6px;border-radius:3px;background:#eee;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:3px}
/* PIX */
.pix-box{background:#f0faf3;border:1px solid #a0ddb8;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px}
</style>
</head>

// ═══════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════
function calcBreakdown(pred,mr,fr,gr){
  var exact=0,correct=0,classified=0;
  MATCHES.forEach(function(m){
    var p=pred&&pred.matches&&pred.matches[m.id];
    var r=mr&&mr[m.id];
    if(!p||p.home==null||p.away==null||!r||!r.played)return;
    if(p.home===r.home&&p.away===r.away){exact++;return;}
    var po=p.home>p.away?'H':p.home<p.away?'A':'D';
    var ro=r.home>r.away?'H':r.home<r.away?'A':'D';
    if(po===ro)correct++;
  });
  Object.keys(GD).forEach(function(g){
    var picks=(pred&&pred.groupPicks&&pred.groupPicks[g])||[];
    var actual=(gr&&gr[g])||[];
    picks.forEach(function(pk){if(actual.indexOf(pk)>=0)classified++;});
  });
  var champ=(pred&&pred.champion&&fr&&fr.champion&&pred.champion===fr.champion)?1:0;
  var vice=(pred&&pred.viceChampion&&fr&&fr.viceChampion&&pred.viceChampion===fr.viceChampion)?1:0;
  return{exact:exact,correct:correct,classified:classified,champion:champ,vice:vice,
    pts:exact*5+correct*2+classified*2+champ*15+vice*8};
}
function calcPts(pred,mr,fr,gr){return calcBreakdown(pred,mr,fr,gr).pts;}

var db;
function initDB(){
  firebase.initializeApp({databaseURL:DB_URL});
  db=firebase.database();
  db.ref('parts').on('value',function(s){ST.parts=s.val()||{};render();});
  db.ref('preds').on('value',function(s){ST.preds=s.val()||{};render();});
  db.ref('mr').on('value',function(s){ST.mr=s.val()||{};render();});
  db.ref('fr').on('value',function(s){ST.fr=s.val()||{champion:'',viceChampion:''};render();});
  db.ref('pix').on('value',function(s){ST.pix=s.val()||{};render();});
  db.ref('gr').on('value',function(s){ST.gr=s.val()||{};render();});
  db.ref('el').on('value',function(s){ST.el=s.val()||{};render();});
}
function dbSet(path,val){if(db)db.ref(path).set(val);}
function dbUpd(path,val){if(db)db.ref(path).update(val);}

function loadSess(){try{return JSON.parse(localStorage.getItem('bolao26s'));}catch(e){return null;}}
function saveSess(s){ST.session=s;localStorage.setItem('bolao26s',JSON.stringify(s));}
function logout(){saveSess(null);ST.tab='ranking';render();}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
var _toastTimer;
function toast(msg){
  var t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;t.style.display='block';
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.style.display='none';},2500);
}

// ═══════════════════════════════════════════════
// LEADERBOARD
// ═══════════════════════════════════════════════
function getLb(){
  return Object.values(ST.parts).map(function(p){
    var bd=calcBreakdown(ST.preds[p.id],ST.mr,ST.fr,ST.gr);
    return Object.assign({},p,bd);
  }).sort(function(a,b){
    if(b.pts!==a.pts)return b.pts-a.pts;
    if(b.exact!==a.exact)return b.exact-a.exact;
    if(b.correct!==a.correct)return b.correct-a.correct;
    if(b.classified!==a.classified)return b.classified-a.classified;
    return 0;
  });
}
function getPaidLb(){return getLb().filter(function(p){return p.paid;});}
function getPool(){return Object.values(ST.parts).filter(function(p){return p.paid;}).length*ENTRY_FEE;}

function bindLogin(){
  var ni=document.getElementById('l-name');
  var pi=document.getElementById('l-pin');
  var sb=document.getElementById('l-submit');
  var tb=document.getElementById('l-toggle');
  var tc=document.getElementById('l-terms');
  if(ni)ni.addEventListener('input',function(){ST.lName=this.value;});
  if(pi){
    pi.addEventListener('input',function(){ST.lPin=this.value.replace(/\D/g,'');this.value=ST.lPin;});
    pi.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  }
  if(sb)sb.addEventListener('click',doLogin);
  if(tb)tb.addEventListener('click',function(){ST.lCreating=!ST.lCreating;ST.lErr='';ST.lPin='';ST.lName='';render();});
  if(tc)tc.addEventListener('change',function(){if(sb){sb.disabled=!this.checked;sb.style.opacity=this.checked?1:.5;}});
}

function doLogin(){
  ST.lErr='';
  var name=(document.getElementById('l-name')||{}).value||ST.lName;
  var pin=(document.getElementById('l-pin')||{}).value||ST.lPin;
  name=name.trim();
  if(!name){ST.lErr='Digite seu nome.';render();return;}
  if(name.toLowerCase()==='admin'){
    if(pin!==ADMIN_PIN){ST.lErr='PIN incorreto.';render();return;}
    saveSess({id:'admin',name:'Admin',isAdmin:true});ST.tab='ranking';render();return;
  }
  var ex=Object.values(ST.parts).find(function(p){return p.name.toLowerCase()===name.toLowerCase();});
  if(ex){
    if(ex.pin!==pin){ST.lErr='PIN incorreto.';render();return;}
    saveSess({id:ex.id,name:ex.name,isAdmin:false});ST.tab='ranking';render();
  } else {
    if(!ST.lCreating){ST.lErr='Participante não encontrado. Clique em "+ Criar nova conta".';render();return;}
    if(pin.length<4){ST.lErr='Use no mínimo 4 dígitos.';render();return;}
    var id=Date.now().toString();
    var bw=(document.getElementById('l-book')||{}).value||'';
    dbSet('parts/'+id,{id:id,name:name,pin:pin,paid:true,bookWish:bw});
    saveSess({id:id,name:name,isAdmin:false});
    toast('Bem-vindo, '+name+'! Não esqueça de pagar o PIX.');
    ST.tab='palpites';render();
  }
}

  var picks=(pred.groupPicks&&pred.groupPicks[g])||[];

    var correct=actual.length>0&&actual.indexOf(team)>=0&&sel;
    var wrong=actual.length>0&&actual.indexOf(team)<0&&sel;
    var bg=correct?'#d0f0df':wrong?'#ffe8e4':sel?'#fff8e0':'#f5faf6';
    var border=correct?'#00a848':wrong?'#c0392b':sel?'#d4a000':'#d0e8d0';

      +'<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">'+team+'</span>'
      +(sel?'<span>'+(correct?'✓':wrong?'✗':'✓')+'</span>':'')
      +(correct?'<span style="font-size:9px;font-weight:700;color:#007a35">+2</span>':'')
      +'</button>';
  });
  html+='</div></div>';

  html+='<div style="font-size:11px;color:#5a8a6a;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Placares (exato +5 · resultado +2)</div>';

      else{var po=mp.home>mp.away?'H':mp.home<mp.away?'A':'D';var ro=res.home>res.away?'H':res.home<res.away?'A':'D';ptsHtml=po===ro?'<span style="color:#00a848;font-weight:700">+2 ✅</span>':'<span style="color:#c0392b;font-weight:700">0 ❌</span>';}
    }
    html+='<div class="card" style="background:'+(res.played?'#e8f8ee':'#ffffff')+';border-color:'+(res.played?'#a0ddb8':'#d0e8d0')+';margin-bottom:8px">';
    if(sch)html+='<div style="font-size:10px;color:#7a9a8a;text-align:center;margin-bottom:6px">📅 '+sch.d+' · ⏰ '+sch.h+' · 📍 '+sch.c+'</div>';

      +'<div style="flex:1;text-align:right"><div class="team-name">'+m.home+'</div><div class="team-flag">'+getFlag(m.home)+'</div></div>'
      +'<div class="stepper"><button class="step-btn" data-bmid="'+m.id+'" data-field="home" data-dir="-1"'+(closed?' disabled':'')+'>−</button><span class="step-val">'+(mp.home!=null?mp.home:'—')+'</span><button class="step-btn plus" data-bmid="'+m.id+'" data-field="home" data-dir="1"'+(closed?' disabled':'')+'>+</button></div>'
      +'<div style="color:#7a9a8a;font-size:13px;padding:0 2px">×</div>'
      +'<div class="stepper"><button class="step-btn" data-bmid="'+m.id+'" data-field="away" data-dir="-1"'+(closed?' disabled':'')+'>−</button><span class="step-val">'+(mp.away!=null?mp.away:'—')+'</span><button class="step-btn plus" data-bmid="'+m.id+'" data-field="away" data-dir="1"'+(closed?' disabled':'')+'>+</button></div>'

    html+='</div>';
  });
  return html;
}

function renderChaveamento(){

    +'<div style="font-size:12px;color:#5a8a6a;margin-bottom:14px">Admin libera cada fase conforme a Copa avança</div>';

    {id:'r32',label:'Oitavas de Final',emoji:'⚔️',color:'#3a7abf',n:16},

    {id:'r4',label:'Final',emoji:'🏆',color:'#c0392b',n:1}

  rounds.forEach(function(rd){

    var hasGames=games.some(function(g){return g&&(g.home||g.away);});
    html+='<div class="card" style="border-left:4px solid '+(isOpen?rd.color:'#d0e8d0')+';opacity:'+(isOpen?1:.65)+';margin-bottom:8px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:'+(isOpen&&hasGames?'10px':'4px')+'">'
      +'<div class="bb" style="font-size:15px;color:'+(isOpen?rd.color:'#7a9a8a')+'">'+rd.emoji+' '+rd.label+'</div>'
      +'<span style="font-size:10px;padding:2px 8px;border-radius:100px;background:'+(isOpen?'#e8f8ee':'#f0f0f0')+';color:'+(isOpen?'#007a35':'#9aaa9a')+'">'+(isOpen?'🔓 Liberada':'🔒 Aguardando')+'</span>'
      +'</div>';
    if(!isOpen){html+='<div style="font-size:12px;color:#9aaa9a">Esta fase será liberada pelo admin após os jogos anteriores.</div>';}
    else if(!hasGames){html+='<div style="text-align:center;padding:16px;color:#7a9a8a;font-size:12px">Confrontos ainda não definidos.</div>';}
    else{
      games.forEach(function(game){
        if(!game||(!game.home&&!game.away))return;
        var hs=parseInt(game.homeScore),as=parseInt(game.awayScore);
        var hasScore=game.homeScore!=null&&game.homeScore!==''&&game.awayScore!=null&&game.awayScore!=='';
        html+='<div style="background:#f5faf6;border:1px solid #d0e8d0;border-radius:8px;padding:10px;margin-bottom:6px">';

        html+='<div style="display:flex;align-items:center;gap:8px">'
          +'<div style="flex:1;text-align:right;font-size:13px;font-weight:700;color:'+(hasScore&&hs>as?'#007a35':'#1a2e1a')+'">'+getFlag(game.home||'')+' '+(game.home||'A definir')+'</div>'
          +'<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">'
          +'<div class="bb" style="font-size:24px;color:#1a6a35;min-width:22px;text-align:center">'+(hasScore?game.homeScore:'-')+'</div>'
          +'<div style="color:#7a9a8a;font-size:12px">×</div>'
          +'<div class="bb" style="font-size:24px;color:#1a6a35;min-width:22px;text-align:center">'+(hasScore?game.awayScore:'-')+'</div>'
          +'</div>'
          +'<div style="flex:1;text-align:left;font-size:13px;font-weight:700;color:'+(hasScore&&as>hs?'#007a35':'#1a2e1a')+'">'+getFlag(game.away||'')+' '+(game.away||'A definir')+'</div>'
          +'</div>';
        if(game.played){if(game.penHome||game.penAway)html+='<div style="text-align:center;font-size:11px;color:#5a8a6a;margin-top:3px">Pênaltis: '+game.penHome+'×'+game.penAway+'</div>';}
        html+='</div>';
      });
    }
    html+='</div>';
  });
  return html;
}

var wikiCache={};
function getWikiPhoto(name,cb){
  var k=name.toLowerCase().replace(/\s+/g,'_');
  if(wikiCache[k]!==undefined){cb(wikiCache[k]);return;}
  fetch('https://en.wikipedia.org/w/api.php?action=query&titles='+encodeURIComponent(name)+'&prop=pageimages&format=json&pithumbsize=80&origin=*')
    .then(function(r){return r.json();}).then(function(d){
      var pages=d.query&&d.query.pages;var page=pages&&Object.values(pages)[0];
      var thumb=page&&page.thumbnail&&page.thumbnail.source;
      wikiCache[k]=thumb||null;cb(thumb||null);
    }).catch(function(){wikiCache[k]=null;cb(null);});
}

function loadElencoPhotos(){
  var team=ST.elencoTeam||'Brasil';
  var squad=SQUADS[team];
  if(!squad)return;
  squad.jogadores.forEach(function(j){
    var pid='ph-'+j.nome.replace(/[^a-zA-Z]/g,'_');
    var el=document.getElementById(pid);
    if(!el)return;
    getWikiPhoto(j.nome,function(url){
      var e=document.getElementById(pid);
      if(url&&e)e.innerHTML='<img src="'+url+'" style="width:44px;height:44px;object-fit:cover;border-radius:50%">';
    });
  });
}

"-" value="'+(game.awayScore||'')+'" data-elfield="'+rd.id+','+i+',awayScore" style="width:44px;text-align:center;padding:8px 4px"></div><input type="text" placeholder="Time visitante" value="'+(game.away||'')+'" data-elfield="'+rd.id+','+i+',away"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px"><input type="text" placeholder="📅 Data" value="'+(game.date||'')+'" data-elfield="'+rd.id+','+i+',date"><input type="text" placeholder="📍 Cidade" value="'+(game.city||'')+'" data-elfield="'+rd.id+','+i+',city"></div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><label style="font-size:11px;color:#5a8a6a;display:flex;align-items:center;gap:4px"><input type="checkbox"'+(game.played?' checked':'')+' data-elfield="'+rd.id+','+i+',played" style="accent-color:#00a848"> Encerrado</label><span style="font-size:11px;color:#9aaa9a">Pênaltis:</span><input type="number" min="0" max="20" placeholder="C" value="'+(game.penHome||'')+'" data-elfield="'+rd.id+','+i+',penHome" style="width:40px;text-align:center;font-size:12px;padding:4px"><span style="color:#9aaa9a">×</span><input type="number" min="0" max="20" placeholder="V" value="'+(game.penAway||'')+'" data-elfield="'+rd.id+','+i+',penAway" style="width:40px;text-align:center;font-size:12px;padding:4px"></div></div>';});}html+='</div>';});}
  if(sub==='final'){var fr=ST.fr||{};html+='<div class="card" style="border:1px solid rgba(212,160,0,.3)"><div class="bb" style="font-size:15px;color:#d4a000;letter-spacing:2px;margin-bottom:12px">🏆 RESULTADO FINAL</div><div style="margin-bottom:10px"><div style="font-size:11px;color:#5a8a6a;margin-bottom:4px">Campeão</div><select id="fr-champ"><option value="">A definir...</option>'+ALL_TEAMS.map(function(t){return'<option value="'+t+'"'+(fr.champion===t?' selected':'')+'>'+getFlag(t)+' '+t+'</option>';}).join('')+'</select></div><div><div style="font-size:11px;color:#5a8a6a;margin-bottom:4px">Vice-campeão</div><select id="fr-vice"><option value="">A definir...</option>'+ALL_TEAMS.map(function(t){return'<option value="'+t+'"'+(fr.viceChampion===t?' selected':'')+'>'+getFlag(t)+' '+t+'</option>';}).join('')+'</select></div></div>';}
  return html;
}

function bindMain(){
  document.querySelectorAll('[data-tab]').forEach(function(b){b.addEventListener('click',function(){ST.tab=this.dataset.tab;render();if(ST.tab==='elencos')setTimeout(loadElencoPhotos,100);});});
  var rb=document.getElementById('btn-refresh');if(rb)rb.addEventListener('click',function(){toast('↺ Atualizado!');});
  var rs=document.getElementById('rank-search');if(rs)rs.addEventListener('input',function(){ST.rankSearch=this.value;render();});
  var sa=document.getElementById('btn-show-all');if(sa)sa.addEventListener('click',function(){ST.showAllRanking=!ST.showAllRanking;render();});
  document.querySelectorAll('[data-grp]').forEach(function(b){b.addEventListener('click',function(){ST.group=this.dataset.grp;render();});});
  var sc=document.getElementById('sp-champ');var sv=document.getElementById('sp-vice');
  if(sc)sc.addEventListener('change',function(){var s=ST.session;if(s&&!s.isAdmin){if(isClosed()){toast('⏰ Prazo encerrado!');return;}dbSet('preds/'+s.id+'/champion',this.value);}});
  if(sv)sv.addEventListener('change',function(){var s=ST.session;if(s&&!s.isAdmin){if(isClosed()){toast('⏰ Prazo encerrado!');return;}dbSet('preds/'+s.id+'/viceChampion',this.value);}});
  document.querySelectorAll('[data-bmid]').forEach(function(b){b.addEventListener('click',function(){var s=ST.session;if(!s||s.isAdmin)return;if(isClosed()){toast('⏰ Prazo encerrado!');return;}var mid=this.dataset.bmid,field=this.dataset.field,dir=parseInt(this.dataset.dir);var cur=((ST.preds[s.id]&&ST.preds[s.id].matches&&ST.preds[s.id].matches[mid])||{});var val=Math.max(0,(cur[field]!=null?cur[field]:0)+dir);dbSet('preds/'+s.id+'/matches/'+mid+'/'+field,val);});});
  document.querySelectorAll('[data-gpick]').forEach(function(b){b.addEventListener('click',function(){var s=ST.session;if(!s||s.isAdmin)return;if(isClosed()){toast('⏰ Prazo encerrado!');return;}var g=this.dataset.gpick,team=this.dataset.team;var pred=ST.preds[s.id]||{};var picks=((pred.groupPicks&&pred.groupPicks[g])||[]).slice();var idx=picks.indexOf(team);if(idx>=0)picks.splice(idx,1);else if(picks.length<2)picks.push(team);else{picks.shift();picks.push(team);}dbSet('preds/'+s.id+'/groupPicks/'+g,picks);});});
  document.querySelectorAll('[data-sub]').forEach(function(b){b.addEventListener('click',function(){ST.adminSub=this.dataset.sub;render();});});
  document.querySelectorAll('[data-toggle-paid]').forEach(function(b){b.addEventListener('click',function(){var id=this.dataset.togglePaid;var p=ST.parts[id];if(!p)return;dbSet('parts/'+id+'/paid',!p.paid);toast((p.paid?'✗ Removido':'✓ Confirmado')+' — '+p.name);});});
  document.querySelectorAll('[data-delete-user]').forEach(function(b){b.addEventListener('click',function(){var id=this.dataset.deleteUser;var p=ST.parts[id];if(!p)return;if(!confirm('Excluir '+p.name+'?'))return;dbSet('parts/'+id,null);dbSet('preds/'+id,null);toast('🗑 '+p.name+' excluído!');});});
  document.querySelectorAll('[data-toggle-played]').forEach(function(b){b.addEventListener('click',function(){var mid=this.dataset.togglePlayed;var r=(ST.mr&&ST.mr[mid])||{home:0,away:0,played:false};dbUpd('mr/'+mid,{played:!r.played});});});
  document.querySelectorAll('[data-amid]').forEach(function(b){b.addEventListener('click',function(){var mid=this.dataset.amid,field=this.dataset.field,dir=parseInt(this.dataset.dir);var r=(ST.mr&&ST.mr[mid])||{home:0,away:0,played:false};var upd={};upd[field]=Math.max(0,(r[field]||0)+dir);dbUpd('mr/'+mid,upd);});});
  document.querySelectorAll('[data-agrp]').forEach(function(b){b.addEventListener('click',function(){ST.adminGrp=this.dataset.agrp;render();});});
  document.querySelectorAll('[data-aclass]').forEach(function(b){b.addEventListener('click',function(){var g=this.dataset.aclass,team=this.dataset.team;var actual=((ST.gr&&ST.gr[g])||[]).slice();var idx=actual.indexOf(team);if(idx>=0)actual.splice(idx,1);else if(actual.length<2)actual.push(team);else{actual.shift();actual.push(team);}var newGr=Object.assign({},ST.gr||{});newGr[g]=actual;ST.gr=newGr;dbSet('gr',newGr);render();toast('Classificados Grupo '+g+'!');});});
  var bsp=document.getElementById('btn-save-pix');if(bsp)bsp.addEventListener('click',function(){dbSet('pix',{type:(document.getElementById('pix-type')||{}).value||'',key:(document.getElementById('pix-key')||{}).value||'',owner:(document.getElementById('pix-owner')||{}).value||''});toast('✓ PIX salva!');});
  var fc=document.getElementById('fr-champ');var fv=document.getElementById('fr-vice');
  if(fc)fc.addEventListener('change',function(){dbUpd('fr',{champion:this.value});});
  if(fv)fv.addEventListener('change',function(){dbUpd('fr',{viceChampion:this.value});});
  document.querySelectorAll('[data-lock]').forEach(function(b){b.addEventListener('click',function(){var val=this.dataset.lock==='1';var newEl=Object.assign({},ST.el||{});newEl.locked=val;ST.el=newEl;dbSet('el',newEl);toast(val?'🔒 Bloqueado!':'🔓 Desbloqueado!');render();});});
  document.querySelectorAll('[data-unlock]').forEach(function(b){b.addEventListener('click',function(){var rid=this.dataset.unlock;var newEl=Object.assign({},ST.el||{});var unl=Object.assign({},newEl.unlocked||{});unl[rid]=!unl[rid];newEl.unlocked=unl;ST.el=newEl;dbSet('el',newEl);render();toast((unl[rid]?'🔓 Liberada':'🔒 Bloqueada')+'!');});});
  document.querySelectorAll('[data-elfield]').forEach(function(inp){inp.addEventListener('change',function(){var parts=this.dataset.elfield.split(',');var rid=parts[0],i=parseInt(parts[1]),field=parts[2];var newEl=JSON.parse(JSON.stringify(ST.el||{}));if(!newEl[rid])newEl[rid]=[];while(newEl[rid].length<=i)newEl[rid].push({home:'',away:'',homeScore:'',awayScore:'',penHome:'',penAway:'',date:'',city:'',played:false});newEl[rid][i][field]=field==='played'?this.checked:this.value;ST.el=newEl;dbSet('el',newEl);});});
  document.querySelectorAll('[data-elgrp]').forEach(function(b){b.addEventListener('click',function(){ST.elencoGroup=this.dataset.elgrp;ST.elencoTeam=GD[ST.elencoGroup].t[0];render();setTimeout(loadElencoPhotos,100);});});
  document.querySelectorAll('[data-elteam]').forEach(function(b){b.addEventListener('click',function(){ST.elencoTeam=this.dataset.elteam;render();setTimeout(loadElencoPhotos,100);});});
  if(ST.tab==='elencos')setTimeout(loadElencoPhotos,100);
}

window.addEventListener('load',function(){
  ST.session=loadSess();
  // Safety timeout - show app even if Firebase is slow
  setTimeout(function(){
    if(document.getElementById('loading').style.display!=='none'){
      document.getElementById('loading').style.display='none';
      var app=document.getElementById('app');
      app.style.display='block';
      if(!ST.session){app.innerHTML=renderLogin()+rulesHTML();bindLogin();}
      else render();
    }
  },5000);
  initDB();
});
</script>
</body>
</html>
