<!DOCTYPE html>
<html lang="pt-BR">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#f0f5f1;color:#1a2e1a;font-family:'Barlow',sans-serif;min-height:100vh;}
input,select,button{font-family:'Barlow',sans-serif;}
select option{background:#fff;color:#1a2e1a;}
.bb{font-family:'Bebas Neue',cursive;}
.app{max-width:540px;margin:0 auto;}
/* Header */
.hdr{background:linear-gradient(135deg,#0a2e18 0%,#1a4a28 60%,#1a3000 100%);padding:12px 16px;border-bottom:3px solid #00d65a;}
.hdr-inner{display:flex;align-items:center;gap:10px;}
.hdr-title{font-family:'Bebas Neue',cursive;font-size:clamp(20px,5.5vw,32px);letter-spacing:3px;background:linear-gradient(90deg,#00d65a,#ffc300);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.hdr-sub{font-size:11px;color:#a0d0b0;letter-spacing:1.5px;margin-top:2px;}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;color:#00d65a;}
/* Nav */
.nav{background:#ffffff;border-bottom:2px solid #d0e8d0;display:flex;overflow-x:auto;box-shadow:0 2px 8px rgba(0,150,60,.08);}
.nav::-webkit-scrollbar{display:none;}
.ntab{flex:1;padding:9px 4px;background:transparent;border:none;border-bottom:3px solid transparent;color:#5a8a6a;font-weight:700;font-size:11px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;font-family:'Barlow',sans-serif;}
.ntab.act{border-bottom-color:#00d65a;color:#007a35;}
.ntab span{display:block;font-size:16px;margin-bottom:2px;}
/* Content */
.content{padding:14px 14px 80px;}
/* Cards */
.card{background:#ffffff;border:1px solid #d0e8d0;border-radius:12px;padding:13px 14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,120,50,.06);}
/* Inputs */
input[type=text],input[type=password],select{background:#f5faf6;border:1px solid #c0dcc0;border-radius:8px;color:#1a2e1a;padding:10px 13px;font-size:14px;outline:none;width:100%;}
input[type=text]:focus,input[type=password]:focus,select:focus{border-color:#00d65a;background:#fff;}
.btn{background:#00d65a;color:#fff;border:none;border-radius:8px;padding:11px 18px;font-weight:700;cursor:pointer;font-size:13px;font-family:'Barlow',sans-serif;}
.btn-ghost{background:transparent;color:#5a8a6a;border:1px solid #c0dcc0;border-radius:8px;padding:9px 14px;font-weight:700;cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif;}
.btn-red{background:transparent;color:#c0392b;border:1px solid #f0a0a0;border-radius:8px;padding:7px 12px;font-weight:700;cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif;}
/* Badge */
.badge-paid{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:#e0f8ec;color:#007a35;border:1px solid #a0ddb8;white-space:nowrap;}
.badge-pend{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:#fef0ee;color:#c0392b;border:1px solid #f0b0a8;white-space:nowrap;}
/* Stepper */
.step{display:flex;align-items:center;background:#f0f8f3;border:1px solid #c0dcc0;border-radius:8px;overflow:hidden;}
.step-btn{background:none;border:none;color:#5a8a6a;padding:6px 10px;cursor:pointer;font-size:18px;line-height:1;touch-action:manipulation;}
.step-btn.plus{color:#007a35;}
.step-val{font-family:'Bebas Neue',cursive;color:#1a6a35;font-size:22px;min-width:28px;text-align:center;}
/* Match row */
.match-row{display:flex;align-items:center;gap:6px;}
.team-name{font-weight:600;font-size:13px;color:#1a2e1a;}
.team-flag{font-size:18px;}
/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#007a35;color:#fff;padding:10px 22px;border-radius:100px;font-weight:700;z-index:9999;font-size:13px;white-space:nowrap;pointer-events:none;box-shadow:0 4px 16px rgba(0,180,80,.3);}
/* Admin subtabs */
.stab{padding:7px 13px;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Barlow',sans-serif;border:1px solid #c0dcc0;background:#fff;color:#5a8a6a;white-space:nowrap;}
.stab.act{border-color:#00d65a;background:#e8f8ee;color:#007a35;}
/* PIX box */
.pix-box{background:#f0faf3;border:1px solid #a0ddb8;border-radius:8px;padding:10px 13px;display:flex;align-items:center;gap:10px;}
/* Warn box */
.warn{background:#fff8e8;border:1px solid #f0cc80;border-radius:12px;padding:13px 14px;margin-bottom:10px;}
/* Lb row */
.lb-row{display:flex;align-items:center;gap:8px;}
/* Group grid */
.ggrids{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:14px;}
.ggbtn{padding:8px 2px;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px;font-family:'Bebas Neue',cursive;border:2px solid #c0dcc0;background:#fff;color:#5a8a6a;touch-action:manipulation;position:relative;}
.ggbtn.act{border-color:#00d65a;background:#00d65a;color:#fff;}
.ggbtn.done{border-color:#a0ddb8;background:#e8f8ee;color:#007a35;}
.ggbtn.part{border-color:#f0cc80;background:#fff8e8;color:#8a6a00;}
/* Login */
.login-wrap{max-width:400px;margin:0 auto;padding:24px 16px;}
/* Loading */
#loading{position:fixed;inset:0;background:#f0f5f1;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:999;}
#loading .spin{font-size:52px;animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#b0d0b8;border-radius:2px;}
</style>
</head>

// Wikipedia photo cache
var wikiPhotoCache={};
function getWikiPhoto(name, callback){
  var key=name.toLowerCase().replace(/\s+/g,'_');
  if(wikiPhotoCache[key]!==undefined){callback(wikiPhotoCache[key]);return;}
  var url='https://en.wikipedia.org/w/api.php?action=query&titles='+encodeURIComponent(name)+'&prop=pageimages&format=json&pithumbsize=80&origin=*';
  fetch(url).then(function(r){return r.json();}).then(function(d){
    var pages=d.query&&d.query.pages;
    var page=pages&&Object.values(pages)[0];
    var thumb=page&&page.thumbnail&&page.thumbnail.source;
    wikiPhotoCache[key]=thumb||null;
    callback(thumb||null);
  }).catch(function(){wikiPhotoCache[key]=null;callback(null);});
}

function calcBreakdown(pred,mr,fr,gr){
  var exact=0,correct=0,classified=0,champion=0,vice=0;
  for(var i=0;i<MATCHES.length;i++){
    var m=MATCHES[i];
    var p=pred&&pred.matches&&pred.matches[m.id];
    var r=mr&&mr[m.id];
    if(!p||p.home==null||p.away==null||!r||!r.played)continue;
    if(p.home===r.home&&p.away===r.away){exact++;continue;}
    var po=p.home>p.away?'H':p.home<p.away?'A':'D';
    var ro=r.home>r.away?'H':r.home<r.away?'A':'D';
    if(po===ro)correct++;
  }
  var grKeys=Object.keys(GD);
  for(var j=0;j<grKeys.length;j++){
    var g=grKeys[j];
    var picks=pred&&pred.groupPicks&&pred.groupPicks[g]||[];
    var actual=gr&&gr[g]||[];
    for(var k=0;k<picks.length;k++){if(actual.indexOf(picks[k])>=0)classified++;}
  }
  if(pred&&pred.champion&&fr&&fr.champion&&pred.champion===fr.champion)champion=1;
  if(pred&&pred.viceChampion&&fr&&fr.viceChampion&&pred.viceChampion===fr.viceChampion)vice=1;
  return{exact:exact,correct:correct,classified:classified,champion:champion,vice:vice,
    pts:exact*5+correct*2+classified*2+champion*15+vice*8};
}
function calcPts(pred,mr,fr,gr){
  return calcBreakdown(pred,mr,fr,gr).pts;
}

function toast(msg){
  ST.toastMsg=msg;
  if(ST.toastTimer)clearTimeout(ST.toastTimer);
  ST.toastTimer=setTimeout(()=>{ST.toastMsg='';renderToast();},2500);
  renderToast();
}
function renderToast(){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}
  t.textContent=ST.toastMsg;t.style.display=ST.toastMsg?'block':'none';
}

// --- Helpers ---
function avatarBg(name){
  const bgs=['#1a3a2a','#1a2a3a','#2a1a3a','#3a1a2a','#2a2a1a'];
  return bgs[name.charCodeAt(0)%bgs.length];
}
function avatarEl(name,size=36){
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${Math.floor(size*.35)}px;background:${avatarBg(name)}">${initials(name)}</div>`;
}
function paidBadge(paid){return paid?'<span class="badge-paid">✓ PAGO</span>':'<span class="badge-pend">✗ PENDENTE</span>';}

// --- Leaderboard ---
function getLb(){
  return Object.values(ST.parts)
    .map(function(p){
      var bd=calcBreakdown(ST.preds[p.id],ST.mr,ST.fr,ST.groupResults);
      return Object.assign({},p,bd);
    })
    .sort(function(a,b){
      if(b.pts!==a.pts)return b.pts-a.pts;
      if(b.exact!==a.exact)return b.exact-a.exact;
      if(b.correct!==a.correct)return b.correct-a.correct;
      if(b.classified!==a.classified)return b.classified-a.classified;
      if(b.champion!==a.champion)return b.champion-a.champion;
      return 0;
    });
}
function getPaidLb(){
  var past=isPastDeadline(ST.locked);
  return getLb().filter(function(p){
    // After deadline: only confirmed paid users count
    if(past) return !!p.paid;
    // Before deadline: paid users count (pending may still pay)
    return !!p.paid;
  });
}
function getPool(){return Object.values(ST.parts).filter(p=>p.paid).length*ENTRY_FEE;}

function render(){
  const app=document.getElementById('app');
  if(!app)return;
  document.getElementById('loading').style.display='none';
  app.style.display='block';
  if(!ST.session){app.innerHTML=renderLogin();bindLoginEvents();return;}
  app.innerHTML=`
    <div class="app">
      ${renderHeader()}
      ${renderNav()}
      <div class="content">${renderContent()}</div>
    </div>`;
  bindMainEvents();
}

function loadElencoPhotos(){
  var team=ST.elencoTeam||'Brasil';
  var squad=SQUADS[team];
  if(!squad)return;
  squad.jogadores.forEach(function(j){
    var elId='photo-'+j.nome.replace(/[^a-zA-Z]/g,'_');
    var el=document.getElementById(elId);
    if(!el)return;
    getWikiPhoto(j.nome,function(url){
      if(url&&document.getElementById(elId)){
        document.getElementById(elId).innerHTML='<img src="'+url+'" style="width:44px;height:44px;object-fit:cover;border-radius:50%" onerror="this.parentNode.innerHTML=\''+j.nome.split(' ').map(function(w){return w[0];}).join('').slice(0,2)+'\'">';
      }
    });
  });
}

function doLogin(){
  ST.lErr='';
  const name=(ST.lCreating?document.getElementById('l-name-txt')?.value:ST.lName)||ST.lName;
  const pin=document.getElementById('l-pin')?.value||ST.lPin;
  ST.lPin=pin;
  if(!name.trim()){ST.lErr='Digite seu nome.';render();return;}
  if(name.trim().toLowerCase()==='admin'){
    if(pin!==ADMIN_PIN){ST.lErr='PIN incorreto.';render();return;}
    saveSession({id:'admin',name:'Admin',isAdmin:true});ST.tab='ranking';render();return;
  }
  const existing=Object.values(ST.parts).find(p=>p.name.toLowerCase()===name.trim().toLowerCase());
  if(existing){
    if(existing.pin!==pin){ST.lErr='PIN incorreto. Tente novamente.';render();return;}
    saveSession({id:existing.id,name:existing.name,isAdmin:false});ST.tab='ranking';render();
  }else{
    if(!ST.lCreating){ST.lErr='Participante não encontrado. Clique em "Criar nova conta".';render();return;}
    if(pin.length<4){ST.lErr='Use no mínimo 4 dígitos no PIN.';render();return;}
    const id=Date.now().toString();
    const np={id,name:name.trim(),pin,paid:false};
    dbSet(`parts/${id}`,np);
    saveSession({id,name:np.name,isAdmin:false});
    toast(`Bem-vindo, ${np.name}! Não esqueça de pagar o PIX.`);
    ST.tab='palpites';render();
  }
}

  const myPts=calcPts(ST.preds[s.id],ST.mr,ST.fr,ST.groupResults);
  return `<div class="hdr">

// --- Palpites ---
function renderPalpites(){
  var s=ST.session;
  if(!s)return '';
  var pred=ST.preds[s.id]||{};
  var allMatches=pred.matches||{};
  var groupPicks=pred.groupPicks||{};
  var champion=pred.champion||'';
  var viceChampion=pred.viceChampion||'';
  var myPart=ST.parts[s.id];
  var closed=isPastDeadline(ST.locked);
  var msLeft=DEADLINE-new Date();
  var daysLeft=Math.ceil(msLeft/86400000);
  var g=ST.group;
  var html='';
  var todayP=new Date();
  var ddP=String(todayP.getDate()).padStart(2,'0');
  var mmP=String(todayP.getMonth()+1).padStart(2,'0');
  var todayStr=ddP+'/'+mmP;

  html+='<div class="bb" style="font-size:22px;letter-spacing:3px;color:#ffc300;margin-bottom:12px">MEUS PALPITES</div>';

  // Deadline banner
  if(closed){
    html+='<div class="card" style="background:#fff0ee;border-color:#f0b0a8;margin-bottom:12px"><div style="display:flex;gap:10px;align-items:center"><span style="font-size:22px">&#128274;</span><div><div style="font-weight:700;color:#ff4f4f">Palpites encerrados</div><div style="font-size:13px;color:#c0392b;margin-top:2px">O prazo encerrou em 10/06. Seus palpites estão salvos.</div></div></div></div>';
  } else if(msLeft>0){
    html+='<div class="card" style="background:#edfaf2;border-color:#a0ddb8;margin-bottom:12px"><div style="display:flex;gap:10px;align-items:center"><span style="font-size:20px">&#9200;</span><div><div style="font-weight:700;color:#00d65a">Prazo para palpitar</div><div style="font-size:13px;color:#2a7a4a;margin-top:2px">Encerra em <strong style="color:#ffc300">10/06 as 23h59</strong>';
    if(daysLeft>0) html+=' &middot; '+daysLeft+(daysLeft>1?' dias':' dia')+' restante'+(daysLeft>1?'s':'');
    html+='</div></div></div></div>';
  }

  if(myPart&&!myPart.paid){
    // no payment warning for FEN
  }

  // ── ESPECIAL ──────────────────────────────────────────────────────
  html+='<div class="card" style="border:1px solid rgba(255,195,0,.27);margin-bottom:12px">';
  html+='<div class="bb" style="font-size:16px;color:#ffc300;letter-spacing:2px;margin-bottom:12px">&#127942; PALPITE ESPECIAL</div>';
  html+='<div style="margin-bottom:10px"><div style="font-size:11px;color:#5a8a6a;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Campeão da Copa (+15 pts)</div>';
  html+='<select id="sp-champ"'+(closed?' disabled':'')+' style="opacity:'+(closed?0.5:1)+'">';
  html+='<option value="">Selecionar...</option>';
  ALL_TEAMS.forEach(function(t){html+='<option value="'+t+'"'+(champion===t?' selected':'')+'>'+getFlag(t)+' '+t+'</option>';});
  html+='</select></div>';
  html+='<div><div style="font-size:11px;color:#5a8a6a;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Vice-campeão (+8 pts)</div>';
  html+='<select id="sp-vice"'+(closed?' disabled':'')+' style="opacity:'+(closed?0.5:1)+'">';
  html+='<option value="">Selecionar...</option>';
  ALL_TEAMS.forEach(function(t){html+='<option value="'+t+'"'+(viceChampion===t?' selected':'')+'>'+getFlag(t)+' '+t+'</option>';});
  html+='</select></div></div>';

  // ── GROUP NAVIGATION ──────────────────────────────────────────────
  // Count progress per group
  // Check if any group has a game today
  var todayGroup=null;
  Object.keys(GD).forEach(function(grp){
    (MBG[grp]||[]).forEach(function(m){
      var sch=getSchedule(m.home,m.away);
      if(sch&&sch.d&&sch.d.indexOf(todayStr)>=0) todayGroup=grp;
    });
  });
  if(todayGroup){
    html+='<button data-grp="'+todayGroup+'" style="width:100%;background:linear-gradient(90deg,#0a2e18,#1a4a28);color:#00d65a;border:2px solid #00d65a;border-radius:8px;padding:10px 14px;font-weight:700;font-size:13px;cursor:pointer;font-family:Barlow,sans-serif;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px">&#9917; Ver jogos de hoje — Grupo '+todayGroup+'</button>';
  }
  html+='<div style="font-size:11px;color:#5a8a6a;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Escolha o grupo</div>';
  html+='<div class="ggrids">';
  Object.keys(GD).forEach(function(grp){
    var grpMatches=MBG[grp]||[];
    var picks=groupPicks[grp]||[];
    var matchDone=grpMatches.filter(function(m){var mp=allMatches[m.id];return mp&&mp.home!=null&&mp.away!=null;}).length;
    var allDone=(picks.length===2&&matchDone===6);
    var partial=(picks.length>0||matchDone>0)&&!allDone;
    var hasToday=(MBG[grp]||[]).some(function(m){var sch=getSchedule(m.home,m.away);return sch&&sch.d&&sch.d.indexOf(todayStr)>=0;});
    var cls='ggbtn'+(grp===g?' act':allDone?' done':partial?' part':'');
    var extraStyle=hasToday&&grp!==g?'box-shadow:0 0 0 2px #d4a000;':'';
    html+='<button class="'+cls+'" data-grp="'+grp+'" style="'+extraStyle+'">'+grp;
    if(grp==='C') html+='<span style="position:absolute;top:-5px;right:-2px;font-size:9px">&#127462;&#127479;</span>';
    if(hasToday) html+='<span style="position:absolute;top:-6px;left:-2px;font-size:8px;background:#d4a000;color:#fff;border-radius:3px;padding:0 2px;font-family:Barlow,sans-serif;font-weight:700">HOJE</span>';
    html+='</button>';
  });
  html+='</div>';

  // ── SELECTED GROUP: PICKS + MATCHES ──────────────────────────────
  var gData=GD[g];
  var teams=gData.t;
  var flags=gData.e;
  var picks=groupPicks[g]||[];
  var actual=(ST.groupResults||{})[g]||[];
  var grpMatches=MBG[g]||[];

  // Classification picks
  html+='<div class="card" style="margin-bottom:10px;border:1px solid rgba(255,195,0,.2)">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  html+='<div class="bb" style="font-size:14px;color:#ffc300;letter-spacing:1px">&#128202; QUEM PASSA? (+2 pts cada)</div>';
  html+='<span style="font-size:11px;color:#5a8a6a">'+picks.length+'/2</span></div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">';
  teams.forEach(function(team,i){
    var selected=picks.indexOf(team)>=0;
    var correct=actual.length>0&&actual.indexOf(team)>=0&&selected;
    var wrong=actual.length>0&&actual.indexOf(team)<0&&selected;
    var bg=correct?'#0a2a14':wrong?'#2a0a0a':selected?'#1a1d26':'#f5faf6';
    var border=correct?'#00d65a':wrong?'#ff4f4f':selected?'#ffc300':'#d0e8d0';
    var color=correct?'#00d65a':wrong?'#ff4f4f':selected?'#ffc300':'#5a7a6a';
    html+='<button data-gpick="'+g+'" data-team="'+team+'"'+(closed?' disabled':'')+' style="background:'+bg+';border:1px solid '+border+';border-radius:8px;padding:8px 6px;cursor:'+(closed?'not-allowed':'pointer')+';font-weight:'+(selected?700:400)+';font-size:12px;color:'+color+';text-align:left;display:flex;align-items:center;gap:5px;opacity:'+(closed&&!selected?0.5:1)+'">';
    html+='<span style="font-size:15px">'+flags[i]+'</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">'+team+'</span>';
    if(selected) html+='<span style="font-size:12px">'+(correct?'&#10003;':wrong?'&#10007;':'&#10003;')+'</span>';
    if(correct) html+='<span style="font-size:10px;font-weight:700;color:#00d65a">+2</span>';
    html+='</button>';
  });
  html+='</div></div>';

  // Match score predictions
  html+='<div style="font-size:11px;color:#5a8a6a;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Placares (exato +5pts &middot; resultado +2pts)</div>';
  grpMatches.forEach(function(m){
    var mp=allMatches[m.id]||{};
    var res=ST.mr[m.id]||{};
    var homeVal=mp.home!=null?mp.home:'&mdash;';
    var awayVal=mp.away!=null?mp.away:'&mdash;';
    var ptsHtml='';
    if(res.played&&mp.home!=null&&mp.away!=null){
      if(mp.home===res.home&&mp.away===res.away){
        ptsHtml='<span style="color:#ffc300;font-weight:700">+5 &#10024;</span>';
      } else {
        var po=mp.home>mp.away?'H':mp.home<mp.away?'A':'D';
        var ro=res.home>res.away?'H':res.home<res.away?'A':'D';
        ptsHtml=po===ro?'<span style="color:#00d65a;font-weight:700">+2 &#9989;</span>':'<span style="color:#ff4f4f;font-weight:700">0 &#10060;</span>';
      }
    }
    var sch=getSchedule(m.home,m.away);
    html+='<div style="background:'+(res.played?'#0d150f':'#ffffff')+';border:1px solid '+(res.played?'#a0ddb8':'#d0e8d0')+';border-radius:8px;padding:9px 10px;margin-bottom:7px">';
    if(sch) html+='<div style="font-size:10px;color:#5a8a6a;text-align:center;margin-bottom:6px">&#128197; '+sch.d+' &nbsp;&#8226;&nbsp; &#9200; '+sch.h+' &nbsp;&#8226;&nbsp; &#128205; '+sch.c+'</div>';
    html+='<div class="match-row">';
    html+='<div style="flex:1;text-align:right"><div class="team-name">'+m.home+'</div><div class="team-flag">'+getFlag(m.home)+'</div></div>';
    html+='<div class="step"><button class="step-btn" data-bmid="'+m.id+'" data-field="home" data-dir="-1"'+(closed?' disabled':'')+'>&minus;</button><span class="step-val">'+homeVal+'</span><button class="step-btn plus" data-bmid="'+m.id+'" data-field="home" data-dir="1"'+(closed?' disabled':'')+'>+</button></div>';
    html+='<div style="color:#5a8a6a;font-size:14px;padding:0 2px">&times;</div>';
    html+='<div class="step"><button class="step-btn" data-bmid="'+m.id+'" data-field="away" data-dir="-1"'+(closed?' disabled':'')+'>&minus;</button><span class="step-val">'+awayVal+'</span><button class="step-btn plus" data-bmid="'+m.id+'" data-field="away" data-dir="1"'+(closed?' disabled':'')+'>+</button></div>';
    html+='<div style="flex:1;text-align:left"><div class="team-name">'+m.away+'</div><div class="team-flag">'+getFlag(m.away)+'</div></div>';
    html+='</div>';
    if(res.played) html+='<div style="text-align:center;margin-top:6px;font-size:12px"><span style="color:#5a8a6a">Resultado: '+res.home+'&times;'+res.away+'</span> '+ptsHtml+'</div>';
    html+='</div>';
  });

  return html;
}

};

function renderChaveamento(){
  var el=ST.eliminatorias||{};
  var html='';
  html+='<div class="bb" style="font-size:22px;letter-spacing:3px;color:#007a35;margin-bottom:4px">&#127941; FASE ELIMINATÓRIA</div>';
  html+='<div style="font-size:12px;color:#5a8a6a;margin-bottom:14px">Resultados inseridos pelo admin conforme os jogos acontecem</div>';

  // Determine which phases are unlocked
  // Phase unlocks when admin explicitly unlocks it OR when previous phase is complete
  var unlocked=el.unlocked||{r32:false,r16:false,r8:false,r4t:false,r4:false};

  var rounds=[
    {id:'r32',label:'Oitavas de Final',   emoji:'⚔️', color:'#3a7abf', n:16},
    {id:'r16',label:'Quartas de Final',   emoji:'🔥', color:'#007a35', n:8},
    {id:'r8', label:'Semifinais',         emoji:'⭐', color:'#d4a000', n:4},
    {id:'r4t',label:'Disputa 3° Lugar',   emoji:'🥉', color:'#c07030', n:1},
    {id:'r4', label:'Final',              emoji:'🏆', color:'#c0392b', n:1},
  ];

  rounds.forEach(function(round){
    var isUnlocked=!!unlocked[round.id];
    var games=el[round.id]||[];
    var hasAnyGame=games.some(function(g){return g&&(g.home||g.away);});

    html+='<div class="card" style="margin-bottom:10px;border-left:4px solid '+(isUnlocked?round.color:'#d0e8d0')+';opacity:'+(isUnlocked?1:0.6)+'">';
    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:'+(isUnlocked&&hasAnyGame?'10px':'4px')+'">';
    html+='<div class="bb" style="font-size:16px;letter-spacing:1px;color:'+(isUnlocked?round.color:'#9aaa9a')+'">'+round.emoji+' '+round.label+'</div>';
    if(!isUnlocked){
      html+='<span style="font-size:10px;background:#f0f0f0;border:1px solid #d0d0d0;border-radius:100px;padding:2px 8px;color:#9aaa9a">&#128274; Aguardando liberação</span>';
    } else {
      html+='<span style="font-size:10px;background:#e8f8ee;border:1px solid #a0ddb8;border-radius:100px;padding:2px 8px;color:#007a35">&#128275; Liberada</span>';
    }
    html+='</div>';

    if(!isUnlocked){
      html+='<div style="font-size:12px;color:#9aaa9a;padding:8px 0">Esta fase será liberada pelo admin após os jogos anteriores.</div>';
    } else if(!hasAnyGame){
      html+='<div style="text-align:center;padding:20px;color:#8aaa9a;font-size:13px">&#9201; Confrontos ainda não definidos pelo admin.</div>';
    } else {
      games.forEach(function(game){
        if(!game||(!game.home&&!game.away))return;
        var hasScore=game.homeScore!=null&&game.homeScore!==''&&game.awayScore!=null&&game.awayScore!=='';
        var hs=parseInt(game.homeScore),as=parseInt(game.awayScore);
        var homeWin=hasScore&&hs>as;
        var awayWin=hasScore&&as>hs;
        var draw=hasScore&&hs===as;
        html+='<div style="background:'+(game.played?'#e8f8ee':'#f8fafb')+';border:1px solid '+(game.played?'#a0ddb8':'#d0e8d0')+';border-radius:8px;padding:10px;margin-bottom:8px">';
        if(game.date||game.city) html+='<div style="font-size:10px;color:#7a9a8a;text-align:center;margin-bottom:6px">'+(game.date?'&#128197; '+game.date:'')+(game.date&&game.city?' &nbsp;&#8226;&nbsp; ':'')+(game.city?'&#128205; '+game.city:'')+'</div>';
        html+='<div style="display:flex;align-items:center;gap:8px">';
        html+='<div style="flex:1;text-align:right;font-weight:'+(homeWin?700:400)+';font-size:13px;color:'+(homeWin?'#007a35':'#1a2e1a')+'">'+getFlag(game.home||'')+(game.home||'A definir')+'</div>';
        html+='<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">';
        html+='<div class="bb" style="font-size:26px;color:'+(homeWin?'#d4a000':'#1a6a35')+';min-width:24px;text-align:center">'+(hasScore?game.homeScore:'-')+'</div>';
        html+='<div style="color:#9aaa9a;font-size:12px">&times;</div>';
        html+='<div class="bb" style="font-size:26px;color:'+(awayWin?'#d4a000':'#1a6a35')+';min-width:24px;text-align:center">'+(hasScore?game.awayScore:'-')+'</div>';
        html+='</div>';
        html+='<div style="flex:1;text-align:left;font-weight:'+(awayWin?700:400)+';font-size:13px;color:'+(awayWin?'#007a35':'#1a2e1a')+'">'+getFlag(game.away||'')+(game.away||'A definir')+'</div>';
        html+='</div>';
        if(game.played){
          if(game.penHome||game.penAway) html+='<div style="text-align:center;font-size:11px;color:#5a8a6a;margin-top:3px">Pênaltis: '+game.penHome+' &times; '+game.penAway+'</div>';
          var winner=homeWin||(draw&&game.penHome>game.penAway)?game.home:game.away;
          html+='<div style="text-align:center;margin-top:4px;font-size:11px;color:#007a35;font-weight:700">&#10003; '+winner+' avança</div>';
        }
        html+='</div>';
      });
    }
    html+='</div>';
  });
  return html;
}

function bindLoginEvents(){
  var nameInput=document.getElementById('l-name-txt');
  var pinInput=document.getElementById('l-pin');
  var submitBtn=document.getElementById('l-submit');
  var toggleBtn=document.getElementById('l-toggle');
  var termsChk=document.getElementById('l-terms');

  if(nameInput) nameInput.addEventListener('input',function(){ST.lName=this.value;});
  if(pinInput){
    pinInput.addEventListener('input',function(){ST.lPin=this.value.replace(/\D/g,'');this.value=ST.lPin;});
    pinInput.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  }
  if(submitBtn) submitBtn.addEventListener('click',doLogin);
  if(toggleBtn) toggleBtn.addEventListener('click',function(){
    ST.lCreating=!ST.lCreating;ST.lErr='';ST.lPin='';ST.lName='';render();
  });
  if(termsChk) termsChk.addEventListener('change',function(){
    if(submitBtn){submitBtn.disabled=!this.checked;submitBtn.style.opacity=this.checked?1:0.5;}
  });
}

function bindMainEvents(){
  // Logout
  document.getElementById('btn-logout')?.addEventListener('click',()=>{saveSession(null);render();});
  // Tabs
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{ST.tab=b.dataset.tab;render();}));
  // Refresh
  document.getElementById('btn-refresh')?.addEventListener('click',()=>toast('Ranking atualizado em tempo real!'));
  document.getElementById('rank-search')?.addEventListener('input',function(){ST.rankSearch=this.value;render();});
  document.getElementById('btn-show-all')?.addEventListener('click',()=>{ST.showAllRanking=!ST.showAllRanking;render();});
  // Group buttons (palpites)
  document.querySelectorAll('[data-grp]').forEach(b=>b.addEventListener('click',()=>{ST.group=b.dataset.grp;render();}));
  // Group buttons (admin)
  document.querySelectorAll('[data-agrp]').forEach(b=>b.addEventListener('click',()=>{ST.adminGrp=b.dataset.agrp;render();}));
  // Admin sub-tabs
  document.querySelectorAll('[data-sub]').forEach(b=>b.addEventListener('click',()=>{ST.adminSub=b.dataset.sub;render();}));
  // Prediction steppers
  // All match steppers
  document.querySelectorAll('[data-bmid]').forEach(b=>b.addEventListener('click',()=>{
    const s=ST.session;if(!s||s.isAdmin)return;
    if(isPastDeadline(ST.locked)){toast('⏰ Prazo encerrado!');return;}
    const mid=b.dataset.bmid,field=b.dataset.field,dir=parseInt(b.dataset.dir);
    const pred=ST.preds[s.id]||{};
    const cur=(pred.matches||{})[mid]||{};
    const newVal=Math.max(0,(cur[field]!=null?cur[field]:0)+dir);
    dbSet(`preds/${s.id}/matches/${mid}/${field}`,newVal);
  }));
  // Group classification picks
  document.querySelectorAll('[data-gpick]').forEach(b=>b.addEventListener('click',()=>{
    const s=ST.session;if(!s||s.isAdmin)return;
    if(isPastDeadline(ST.locked)){toast('⏰ Prazo encerrado!');return;}
    const g=b.dataset.gpick,team=b.dataset.team;
    const pred=ST.preds[s.id]||{};
    let picks=[...((pred.groupPicks||{})[g]||[])];
    if(picks.includes(team)){picks=picks.filter(t=>t!==team);}
    else if(picks.length<2){picks.push(team);}
    else{picks.shift();picks.push(team);}
    dbSet(`preds/${s.id}/groupPicks/${g}`,picks);
  }));
  // Legacy match steppers (kept for admin results)
  document.querySelectorAll('[data-mid]').forEach(b=>b.addEventListener('click',()=>{
    const s=ST.session;if(!s||s.isAdmin)return;
    if(isPastDeadline(ST.locked)){toast('⏰ Prazo encerrado! Palpites fechados em 10/06.');return;}
    const mid=b.dataset.mid,field=b.dataset.field,dir=parseInt(b.dataset.dir);
    const pred=ST.preds[s.id]||{matches:{},champion:'',viceChampion:''};
    const cur=pred.matches?.[mid]||{};
    const oldVal=cur[field]!=null?cur[field]:field==='home'?0:0;
    const newVal=Math.max(0,oldVal+dir);
    dbSet(`preds/${s.id}/matches/${mid}/${field}`,newVal);
  }));
  // Special preds
  document.getElementById('sp-champ')?.addEventListener('change',e=>{const s=ST.session;if(!s)return;if(isPastDeadline(ST.locked)){toast('⏰ Prazo encerrado!');return;}dbSet(`preds/${s.id}/champion`,e.target.value);});
  document.getElementById('sp-vice')?.addEventListener('change',e=>{const s=ST.session;if(!s)return;if(isPastDeadline(ST.locked)){toast('⏰ Prazo encerrado!');return;}dbSet(`preds/${s.id}/viceChampion`,e.target.value);});
  // Admin: toggle paid
  // Grant/revoke access after deadline
  document.querySelectorAll('[data-grant-access]').forEach(b=>b.addEventListener('click',function(){
    var id=b.dataset.grantAccess;
    var p=ST.parts[id];if(!p)return;
    var newVal=!p.accessGranted;
    dbSet('parts/'+id+'/accessGranted',newVal);
    toast(newVal?'🔓 Acesso liberado para '+p.name:'🔒 Acesso revogado de '+p.name);
  }));
  // Delete user
  document.querySelectorAll('[data-delete-user]').forEach(b=>b.addEventListener('click',function(){
    var id=b.dataset.deleteUser;
    var p=ST.parts[id];if(!p)return;
    if(!confirm('Excluir '+p.name+'? Esta ação não pode ser desfeita.'))return;
    dbSet('parts/'+id,null);
    dbSet('preds/'+id,null);
    toast('🗑 '+p.name+' excluído!');
  }));
  document.querySelectorAll('[data-toggle-paid]').forEach(b=>b.addEventListener('click',()=>{
    const id=b.dataset.togglePaid;const p=ST.parts[id];if(!p)return;
    const newPaid=!p.paid;
    dbSet(`parts/${id}/paid`,newPaid);
    toast(`${p.name}: ${newPaid?'✓ Pagamento confirmado':'✗ Pagamento removido'}`);
  }));
  // Admin: toggle played
  document.querySelectorAll('[data-toggle-played]').forEach(b=>b.addEventListener('click',()=>{
    const mid=b.dataset.togglePlayed;const r=ST.mr[mid]||{home:0,away:0,played:false};
    dbUpdate(`mr/${mid}`,{played:!r.played});
  }));
  // Admin result steppers
  document.querySelectorAll('[data-amid]').forEach(b=>b.addEventListener('click',()=>{
    const mid=b.dataset.amid,field=b.dataset.field,dir=parseInt(b.dataset.dir);
    const r=ST.mr[mid]||{home:0,away:0,played:false};
    const newVal=Math.max(0,(r[field]||0)+dir);
    dbUpdate(`mr/${mid}`,{[field]:newVal});
  }));
  // Admin: save PIX
  document.querySelectorAll('[data-lock]').forEach(b=>b.addEventListener('click',()=>{
    const val = b.dataset.lock==='1';
    dbSet('locked', val);
    ST.locked = val;
    toast(val?'🔒 Palpites bloqueados manualmente!':'🔓 Prazo automático ativado');
    render();
  }));
  document.getElementById('btn-save-pix')?.addEventListener('click',()=>{
    const type=document.getElementById('pix-type')?.value||'';
    const key=document.getElementById('pix-key')?.value||'';
    const owner=document.getElementById('pix-owner')?.value||'';
    dbSet('pix',{type,key,owner});
    toast('✓ Chave PIX salva!');
  });
  // Admin: final result
  // Eliminatorias inputs
  document.querySelectorAll('[data-elim]').forEach(inp=>inp.addEventListener('change',function(){
    const roundId=this.dataset.elim,idx=parseInt(this.dataset.idx),field=this.dataset.field;
    const el=ST.eliminatorias||{};
    const games=[...(el[roundId]||[])];
    while(games.length<=idx)games.push({home:'',away:'',homeScore:'',awayScore:'',played:false});
    games[idx]={...games[idx],[field]:this.value};
    const newEl={...el,[roundId]:games};
    ST.eliminatorias=newEl;
    dbSet('b26-elim',newEl);
  }));
  document.querySelectorAll('[data-toggle-elim]').forEach(b=>b.addEventListener('click',function(){
    const parts=this.dataset.toggleElim.split('-');
    const roundId=parts.slice(0,-1).join('-'),idx=parseInt(parts[parts.length-1]);
    const el=ST.eliminatorias||{};
    const games=[...(el[roundId]||[])];
    while(games.length<=idx)games.push({home:'',away:'',homeScore:'',awayScore:'',played:false});
    games[idx]={...games[idx],played:!games[idx].played};
    const newEl={...el,[roundId]:games};
    ST.eliminatorias=newEl;
    dbSet('b26-elim',newEl);
    render();
    toast(games[idx].played?'✓ Jogo marcado como encerrado':'Jogo reaberto');
  }));
  // Elencos group/team selectors
  document.querySelectorAll('[data-elgrp]').forEach(function(b){
    b.addEventListener('click',function(){
      ST.elencoGroup=b.dataset.elgrp;
      // Auto-select first team of group
      ST.elencoTeam=GD[ST.elencoGroup].t[0];
      render();
      // Load photos after render
      loadElencoPhotos();
    });
  });
  document.querySelectorAll('[data-elteam]').forEach(function(b){
    b.addEventListener('click',function(){
      ST.elencoTeam=b.dataset.elteam;
      render();
      loadElencoPhotos();
    });
  });
  if(ST.tab==='elencos') loadElencoPhotos();
  // Eliminatorias unlock buttons
  document.querySelectorAll('[data-unlock]').forEach(function(b){
    b.addEventListener('click',function(){
      var roundId=b.dataset.unlock;
      var el=Object.assign({},ST.eliminatorias||{});
      var unlocked=Object.assign({},el.unlocked||{});
      unlocked[roundId]=!unlocked[roundId];
      el.unlocked=unlocked;
      ST.eliminatorias=el;
      dbSet('b26-el',el);
      toast((unlocked[roundId]?'&#128275; ':'&#128274; ')+'Fase '+(unlocked[roundId]?'liberada':'bloqueada')+'!');
      render();
    });
  });
  // Eliminatorias field inputs
  document.querySelectorAll('[data-elfield]').forEach(function(inp){
    inp.addEventListener('change',function(){
      var parts=inp.dataset.elfield.split(',');
      var roundId=parts[0],idx2=parseInt(parts[1]),field=parts[2];
      var el=JSON.parse(JSON.stringify(ST.eliminatorias||{}));
      if(!el[roundId]) el[roundId]=[];
      while(el[roundId].length<=idx2) el[roundId].push({home:'',away:'',homeScore:'',awayScore:'',penHome:'',penAway:'',date:'',city:'',played:false});
      el[roundId][idx2][field]=field==='played'?inp.checked:inp.value;
      ST.eliminatorias=el;
      dbSet('b26-el',el);
    });
  });
  document.querySelectorAll('[data-aclass]').forEach(b=>b.addEventListener('click',()=>{
    const g=b.dataset.aclass,team=b.dataset.team;
    const gr=ST.groupResults||{};
    let actual=[...(gr[g]||[])];
    if(actual.includes(team)){actual=actual.filter(t=>t!==team);}
    else if(actual.length<2){actual.push(team);}
    else{actual.shift();actual.push(team);}
    const newGr={...gr,[g]:actual};
    ST.groupResults=newGr;
    dbSet('b26-gr',newGr);
    render();
    toast('Classificados do Grupo '+g+' atualizados!');
  }));
  document.getElementById('fr-champ')?.addEventListener('change',e=>dbUpdate('fr',{champion:e.target.value}));
  document.getElementById('fr-vice')?.addEventListener('change',e=>dbUpdate('fr',{viceChampion:e.target.value}));
}
